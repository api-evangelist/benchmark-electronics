common:
  - type: Website
    url: https://www.bench.com
  - type: Blog
    url: https://www.bench.com/blog
    title: Setting the Benchmark Blog
  - type: Features
    data:
      - name: Electronics Design and Engineering
        description: >-
          Comprehensive engineering services including electrical design, mechanical
          design, software engineering, microwave and mmWave design, and test
          development for complex electronics systems.
      - name: Advanced Manufacturing Services
        description: >-
          Full-service electronics manufacturing including PCB assembly,
          microelectronics, system build, mechanical machining, and automation
          solutions from prototype through high-volume production.
      - name: Lifecycle Management
        description: >-
          End-to-end product lifecycle services covering new product introduction,
          supply chain management, aftermarket support, and sustaining engineering
          to reduce total cost of ownership.
      - name: High-Reliability Manufacturing
        description: >-
          Specialized manufacturing capabilities for high-reliability applications
          including ruggedized electronics, space systems, RF and microwave
          systems, and optics for defense and aerospace markets.
      - name: Supply Chain Management
        description: >-
          Integrated supply chain services including component procurement, inventory
          management, and logistics optimization for complex electronics manufacturing
          programs.
      - name: IoT and Connected Devices
        description: >-
          Design and manufacturing expertise for connected devices, IoT products,
          and liquid-cooled computing systems leveraging advanced technologies
          for next-generation applications.
  - type: UseCases
    data:
      - name: Defense Electronics Manufacturing
        description: >-
          Design and manufacture of ruggedized electronics, avionics, surveillance
          systems, and mission-critical defense electronics for military and
          government programs.
      - name: Medical Device Manufacturing
        description: >-
          Contract manufacturing for FDA-regulated medical devices, including
          medical robotics, diagnostic equipment, and therapeutic devices requiring
          quality management system compliance.
      - name: Aerospace Systems
        description: >-
          Manufacturing of commercial aerospace electronics, avionics subsystems,
          and space-rated electronic assemblies for commercial and government
          space programs.
      - name: Industrial Electronics
        description: >-
          Electronics manufacturing for industrial automation, process control,
          and semiconductor capital equipment requiring precision and reliability
          in demanding environments.
      - name: Advanced Computing Hardware
        description: >-
          Design and manufacturing of advanced computing systems, including
          liquid-cooled computing infrastructure and high-performance processing
          platforms for data center and edge applications.
